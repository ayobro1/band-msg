<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline - Band Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #313338;
      color: #f2f3f5;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: calc(2rem + env(safe-area-inset-top)) calc(2rem + env(safe-area-inset-right)) calc(2rem + env(safe-area-inset-bottom)) calc(2rem + env(safe-area-inset-left));
      text-align: center;
      box-sizing: border-box;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #5865f2;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #b5bac1;
      margin-bottom: 2rem;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 2rem;
      opacity: 0.5;
    }

    button {
      background: #5865f2;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #4f5bda;
    }

    .status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #949ba4;
    }

    .online {
      color: #2d7d46;
    }

    .offline {
      color: #da373c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Band Chat requires an active connection to send and receive messages.
    </p>
    <p class="status" id="status">
      <span class="offline">● Offline</span>
    </p>
    <button onclick="location.reload()">Try Again</button>
  </div>

  <script>
    // Check for connection changes
    window.addEventListener('online', () => {
      document.getElementById('status').innerHTML = '<span class="online">● Connected - Reloading...</span>';
      setTimeout(() => location.reload(), 1000);
    });

    window.addEventListener('offline', () => {
      document.getElementById('status').innerHTML = '<span class="offline">● Offline</span>';
    });

    // Initial check
    if (navigator.onLine) {
      document.getElementById('status').innerHTML = '<span class="online">● Connected</span>';
    }
  </script>
</body>
</html>
