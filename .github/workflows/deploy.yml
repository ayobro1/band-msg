name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # App secrets stored in GitHub Actions secrets.
      # Add/remove names here to match what your app expects.
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
      CONVEX_URL: ${{ secrets.CONVEX_URL }}
      CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CSRF_SECRET: ${{ secrets.CSRF_SECRET }}
      GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Sync GitHub secrets to Vercel env
        shell: bash
        run: |
          set -euo pipefail

          sync_secret() {
            local name="$1"
            local value="$2"

            if [[ -z "${value}" ]]; then
              echo "Skipping ${name} (empty)"
              return 0
            fi

            # Remove current value if present (ignore if missing), then add fresh value.
            vercel env rm "${name}" production --yes --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
            printf '%s' "${value}" | vercel env add "${name}" production --token "$VERCEL_TOKEN" >/dev/null
            echo "Synced ${name}"
          }

          sync_secret CONVEX_DEPLOYMENT "$CONVEX_DEPLOYMENT"
          sync_secret CONVEX_URL "$CONVEX_URL"
          sync_secret CONVEX_SITE_URL "$CONVEX_SITE_URL"
          sync_secret JWT_SECRET "$JWT_SECRET"
          sync_secret SESSION_SECRET "$SESSION_SECRET"
          sync_secret CSRF_SECRET "$CSRF_SECRET"
          sync_secret GIPHY_API_KEY "$GIPHY_API_KEY"
          sync_secret VAPID_PUBLIC_KEY "$VAPID_PUBLIC_KEY"
          sync_secret VAPID_PRIVATE_KEY "$VAPID_PRIVATE_KEY"
          sync_secret VAPID_SUBJECT "$VAPID_SUBJECT"

      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
